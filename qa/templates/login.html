<!DOCTYPE html>
<html>
	<head>
		<title>Login</title>
		<meta charset="UTF-8">
		<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@40,400,0,0&icon_names=visibility,visibility_off" />
		{% load static %}
		<link rel="stylesheet" href="{% static 'css/style.css' %}">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
	
	</head>
	
	
	<body>
	<div class="auth-wrapper">
		<div class="auth-card">
	
			<h2>Login</h2>
			<form method = "POST">
				{% csrf_token %}
					<label for="user_name">Username</label>
					<input type="text" id ="user_name" name="user" required="required">
					
					<label for="password">Password</label>
					<div class="password-wrapper">
						<input type="password" id ="password" name="pass" required="required">
						<span class="toggle-password material-symbols-outlined">visibility</span>
					</div>					
					<button>Login</button>

					<p>Don't have an account? Please <a href="{% url 'signup' %}">Sign up</a> here.</p>

			</form>

		</div>
	</div>
	
	<script>
					document.querySelectorAll(".toggle-password").forEach(icon => {
						icon.addEventListener("click", () => {
							const input = icon.previousElementSibling;

							if (input.type === "password") {
								input.type = "text";
								icon.textContent = "visibility_off";
							} else {
								input.type = "password";
								icon.textContent = "visibility";
							}
						});
					});	
					
	</script>
	</body>
</html>
